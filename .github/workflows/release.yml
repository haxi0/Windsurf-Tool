name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3). Must already exist or will be created from current ref.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VERSION"
          echo "tag version:          ${{ steps.tag.outputs.version }}"
          if [ "$PKG_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies --out "windsurf-switch-${{ steps.tag.outputs.version }}.vsix"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="${{ steps.tag.outputs.tag }}" 2>/dev/null || echo "")
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "$PREV_TAG..${{ steps.tag.outputs.tag }}"
              echo ""
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ steps.tag.outputs.tag }}"
            else
              git log --pretty=format:"- %s (%h)"
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windsurf-switch-${{ steps.tag.outputs.version }}
          path: windsurf-switch-${{ steps.tag.outputs.version }}.vsix
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            windsurf-switch-${{ steps.tag.outputs.version }}.vsix
