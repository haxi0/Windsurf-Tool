name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX (dry-run)
        run: npx --yes @vscode/vsce package --no-dependencies --out windsurf-switch-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windsurf-switch-ci-${{ github.sha }}
          path: windsurf-switch-ci.vsix
          if-no-files-found: error
          retention-days: 14
